name: Build Debug APK

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - arm
          - arm64
          - x86
          - x86_64

jobs:
  build-debug:
    name: Build debug APK (${{ inputs.arch }})
    runs-on: ubuntu-latest

    env:
      # Keep these empty: this workflow builds Debug only and does not require release signing secrets.
      KEY_PASSWORD: ""
      STORE_PASSWORD: ""
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :ZalithLauncher:assembleDebug -Darch=${{ inputs.arch }}

      - name: List APK outputs
        if: always()
        run: |
          find ZalithLauncher/build/outputs -type f | sort || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-debug-${{ inputs.arch }}
          path: |
            ZalithLauncher/build/outputs/apk/debug/*.apk
            ZalithLauncher/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error
