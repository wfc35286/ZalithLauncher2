name: Build Debug APK

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target architecture"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - arm
          - arm64
          - x86
          - x86_64

jobs:
  build-debug:
    name: Build debug APK (${{ inputs.arch }})
    runs-on: ubuntu-latest

    env:
      # Keep these empty: this workflow builds Debug only and does not require release signing secrets.
      KEY_PASSWORD: ""
      STORE_PASSWORD: ""
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Patch LWJGL classes jar
        run: |
          set -euo pipefail
          mkdir -p /tmp/lwjgl-patch
          javac -source 8 -target 8 \
            -cp "ZalithLauncher/src/main/assets/components/lwjgl3/lwjgl-glfw-classes.jar:LWJGL/libs/*:LWJGL/compileOnly/*" \
            -d /tmp/lwjgl-patch \
            LWJGL/src/main/java/com/movtery/zalithlauncher/CursorRegistry.java \
            LWJGL/src/main/java/org/lwjgl/glfw/GLFW.java
          jar uf ZalithLauncher/src/main/assets/components/lwjgl3/lwjgl-glfw-classes.jar -C /tmp/lwjgl-patch .
          date +%s%3N > ZalithLauncher/src/main/assets/components/lwjgl3/version

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :ZalithLauncher:assembleDebug -Darch=${{ inputs.arch }}

      - name: List APK outputs
        if: always()
        run: |
          find ZalithLauncher/build/outputs -type f | sort || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-debug-${{ inputs.arch }}
          path: |
            ZalithLauncher/build/outputs/apk/debug/*.apk
            ZalithLauncher/build/outputs/apk/*/debug/*.apk
          if-no-files-found: error