name: Android CI

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  Build:
    uses: ./.github/workflows/build.yml
    with:
      variant: Release
    secrets:
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      RELEASE_JKS_BASE64: ${{ secrets.RELEASE_JKS_BASE64 }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}

  Upload-to-Release:
    needs: Build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download Files
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Organize Artifacts
        run: |
          mkdir -p ./apks
          mkdir -p ./mappings

          find ./artifacts -name "*.apk" -type f -exec cp {} ./apks/ \;

          # 检查是否有APK文件
          if [ -z "$(ls -A ./apks/)" ]; then
            echo "No APK files found to upload!"
            exit 1
          fi

          for dir in ./artifacts/*/; do
            dir_name=$(basename "$dir")

            # 跳过 APK
            if [[ "$dir_name" == *"release apk"* ]]; then
              continue
            fi

            if [[ "$dir_name" == mapping* ]]; then
              (cd "$dir" && zip -r "../${dir_name}.zip" .)
              mv "./artifacts/${dir_name}.zip" ./mappings/
            fi
          done

          echo "Found $(ls ./apks/ | wc -l) APK file(s)"
          echo "Found $(ls ./mappings/ | wc -l) Mapping file(s)"

      - name: Upload To Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./apks/*.apk
            ./mappings/*.zip
          fail_on_unmatched_files: true
