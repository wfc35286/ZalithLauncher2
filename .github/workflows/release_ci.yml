name: Android CI

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  Build:
    uses: ./.github/workflows/build.yml
    with:
      variant: Release
    secrets:
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      RELEASE_JKS_BASE64: ${{ secrets.RELEASE_JKS_BASE64 }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}

  Upload-to-Release:
    needs: Build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download Files
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Organize Artifacts
        run: |
          mkdir -p ./apks
          mkdir -p ./mappings

          find ./artifacts -name "*.apk" -type f -exec cp {} ./apks/ \;

          # 检查是否有APK文件
          if [ -z "$(ls -A ./apks/)" ]; then
            echo "No APK files found to upload!"
            exit 1
          fi

          # 处理映射文件 区分架构
          for mapping_dir in ./artifacts/mapping\ \(*\)/; do
            if [ -d "$mapping_dir" ] && [ -f "${mapping_dir}mapping.txt" ]; then
              dirname=$(basename "$mapping_dir")
              cp "${mapping_dir}mapping.txt" "./mappings/${dirname}.txt"
              echo "Copied: ${dirname}.txt"
            fi
          done

          echo "Found $(ls ./apks/ | wc -l) APK file(s)"
          echo "Found $(ls ./mappings/ | wc -l) Mapping file(s)"

      - name: Upload To Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./apks/*.apk
            ./mappings/*.txt
          fail_on_unmatched_files: true
