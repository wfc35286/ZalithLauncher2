name: Android CI

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  Build:
    uses: ./.github/workflows/build.yml
    with:
      variant: Release
    secrets:
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

  Upload-to-Release:
    needs: Build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download Files
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Organize Artifacts
        run: |
          mkdir -p ./apks
          mkdir -p ./mappings
          
          find ./artifacts -name "*.apk" -type f -exec cp {} ./apks/ \;
          
          # 复制所有 mapping 压缩包
          find ./artifacts -name "mapping*.zip" -type f -exec cp {} ./mappings/ \;
          
          # 检查是否有文件
          if [ -z "$(ls -A ./apks/)" ] && [ -z "$(ls -A ./mappings/)" ]; then
            echo "No APK or Mapping files found to upload!"
            exit 1
          fi
          
          echo "Found $(ls ./apks/ | wc -l) APK file(s)"
          echo "Found $(ls ./mappings/ | wc -l) Mapping file(s)"

      - name: Upload To Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./apks/*.apk
            ./mappings/*.zip
          fail_on_unmatched_files: true
